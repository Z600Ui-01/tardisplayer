<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>TARDIS PLAYER</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <!-- 외부 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
  <div class="outer">
    <input type="file" id="audioInput" accept="audio/*" multiple style="display:none">
    <input type="file" id="srtInput" accept=".srt" style="display:none">
    <audio id="audioPlayer"></audio>

    <div class="upload-floating">
      <div class="upload-float-btn" onclick="document.getElementById('audioInput').click()">
        <div class="upload-float-icon" id="audioIcon">
          <img src="icons/folder_import.svg" width="100%" height="100%" alt="">
        </div>
        <span class="upload-float-label">AUDIO</span>
      </div>

      <div class="upload-float-btn" onclick="document.getElementById('srtInput').click()">
        <div class="upload-float-icon" id="srtIcon">
          <img src="icons/folder_import.svg" width="100%" height="100%" alt="">
        </div>
        <span class="upload-float-label">SRT</span>
      </div>

      <div class="upload-float-btn" id="exportSrtBtn">
        <div class="upload-float-icon" id="exportIcon">
          <img src="icons/folder_export.svg" width="100%" height="100%" alt="">
        </div>
        <span class="upload-float-label">SRT</span>
      </div>

      <div class="upload-float-btn" id="screenshotBtn">
        <div class="upload-float-icon" id="captureIcon">
          <img src="icons/capture.svg" width="100%" height="100%" alt="">
        </div>
        <span class="upload-float-label">CAPTURE</span>
      </div>


      <div class="upload-float-btn" id="generateBtn">
        <div class="upload-float-icon" id="generateIcon">
          <img src="icons/generate.svg" width="100%" height="100%" alt=""> </div>
        <span class="upload-float-label">GENERATE</span>
      </div>


    </div>

    <div class="window-wrapper">
      <div class="window-shadow"></div>
      <div class="window">
        <div class="sidebar">
          <div class="cover-section">
            <div class="cover-img" id="coverImg">?</div>
          </div>

          <div style="height: 1px; background: var(--charcoal); flex-shrink: 0; margin: 0 -20px;"></div>

          <div class="settings-section">
            <div class="setting-group">
              <div class="setting-group-title">
                <div class="setting-group-icon">
                  <img src="icons/folder2.svg" width="100%" height="100%" alt="">
                </div>
                자막 표시
              </div>
              <div class="setting-option active" data-group="subtitle" data-value="both">
                <span style="margin-left: 30px;">—</span>
                <span>원문 + 번역</span>
                <span class="dot"></span>
              </div>
              <div class="setting-option" data-group="subtitle" data-value="en">
                <span style="margin-left: 30px;">—</span>
                <span>원문만</span>
                <span class="dot"></span>
              </div>
              <div class="setting-option" data-group="subtitle" data-value="kr">
                <span style="margin-left: 30px;">—</span>
                <span>번역만</span>
                <span class="dot"></span>
              </div>
            </div>

            <div class="setting-group">
              <div class="setting-group-title">
                <div class="setting-group-icon">
                  <img src="icons/folder2.svg" width="100%" height="100%" alt="">
                </div>
                재생 속도
              </div>
              <div class="setting-option active" data-group="speed" data-value="1">
                <span style="margin-left: 30px;">—</span>
                <span>1x</span>
                <span class="dot"></span>
              </div>
              <div class="setting-option" data-group="speed" data-value="0.8">
                <span style="margin-left: 30px;">—</span>
                <span>0.8x</span>
                <span class="dot"></span>
              </div>
              <div class="setting-option" data-group="speed" data-value="1.2">
                <span style="margin-left: 30px;">—</span>
                <span>1.2x</span>
                <span class="dot"></span>
              </div>
              <div class="setting-option" data-group="speed" data-value="2">
                <span style="margin-left: 30px;">—</span>
                <span>2x</span>
                <span class="dot"></span>
              </div>
            </div>

            <div class="setting-group">
              <div class="setting-group-title">
                <div class="setting-group-icon">
                  <img src="icons/folder2.svg" width="100%" height="100%" alt="">
                </div>
                스포일러 방지
              </div>
              <div class="setting-option" data-group="spoiler" data-value="on">
                <span style="margin-left: 30px;">—</span>
                <span>켜기</span>
                <span class="dot"></span>
              </div>
              <div class="setting-option active" data-group="spoiler" data-value="off">
                <span style="margin-left: 30px;">—</span>
                <span>끄기</span>
                <span class="dot"></span>
              </div>
            </div>
          </div>
        </div>

        <div class="main">
          <div class="titlebar">
            <div class="titlebar-dots">
              <span></span><span></span><span></span>
            </div>
            <div class="titlebar-title" id="titleText"><span id="titleSpan">TEMPORAL COORDINATES UNKNOWN</span></div>
            <div class="titlebar-key" id="keyBtn">
              <div class="key-icon">
                <img src="icons/key.svg" width="100%" height="100%" alt="">
              </div>
            </div>
          </div>

          <div class="subtitle-area" style="justify-content: center;">
            <div class="subtitle-line active" style="text-align: center; opacity: 0.5;">
              <div class="subtitle-kr">자막 물질화 대기 중...</div>
              <div class="subtitle-en">Waiting for subtitle materialization...</div>
            </div>
          </div>

          <div class="player-area">
            <div class="player-top">
              <div class="controls">
                <button class="ctrl-btn" id="btnBack">-10</button>
                <button class="play-btn" id="btnPlay">
                  <div class="play-icon" id="playIcon"></div>
                </button>
                <button class="ctrl-btn" id="btnFwd">+10</button>
              </div>
              <div class="player-info">
                <div class="progress-bar" id="progressBar">
                  <div class="progress-fill" id="progressFill"></div>
                  <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <span class="player-time"><span id="timeCurrent">0:00</span> / <span id="timeTotal">0:00</span></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="apiModal">
    <div class="modal-box">
      <h2 class="modal-title">API KEYS</h2>

      <div class="modal-group">
        <label>OpenAI API Key (Whisper STT용)</label>
        <input type="password" id="openaiInput" placeholder="sk-...">
        <p class="modal-desc">키 발급: <a href="https://platform.openai.com/api-keys"
            target="_blank">platform.openai.com/api-keys</a></p>
      </div>

      <div class="modal-group">
        <label>Anthropic API Key (Claude 번역용)</label>
        <input type="password" id="anthropicInput" placeholder="sk-ant-...">
        <p class="modal-desc">키 발급: <a href="https://console.anthropic.com/settings/keys"
            target="_blank">console.anthropic.com/settings/keys</a></p>
      </div>

      <div class="modal-actions">
        <button class="modal-btn cancel" id="btnCancelApi">취소</button>
        <button class="modal-btn confirm" id="btnConfirmApi">확인</button>
      </div>
    </div>
  </div>
  </div>
</body>

</html>
